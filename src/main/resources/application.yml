server:
  port: 8081
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  tomcat:
    uri-encoding: UTF-8
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/yuliyuli_enterprise?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      port: 6379
      host: localhost
      database: 0   
  servlet:
    multipart:
      max-file-size: 3GB
      max-request-size: 3GB
      location: static/videoUrl   
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        acknowledge-mode: manual
        retry:
          enabled: false
          max-retries: 3
          initial-interval: 1000
          multiplier: 2.0
upload:
  videopath: C:\Users\Administrator\Desktop\yuliyuli_enterprise\yuliyuli-frontend\static\videoUrl
  coverPath: C:\Users\Administrator\Desktop\yuliyuli_enterprise\yuliyuli-frontend\static\coverUrl
  avatarPath: C:\Users\Administrator\Desktop\yuliyuli_enterprise\yuliyuli-frontend\static\avatarUrl
snowflake:
  worker-id: 1
  datacenter-id: 1
logging:
  charset:
    console: GBK     
    file: UTF-8          