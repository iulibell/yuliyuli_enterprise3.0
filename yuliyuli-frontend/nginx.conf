server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # 开启 gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # 前端路由支持（Vue Router 的 history 模式）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 视频文件处理
    location /static/videoUrl/ {
        alias /usr/share/nginx/html/static/videoUrl/;
        add_header Accept-Ranges bytes;
        add_header Cache-Control "public, max-age=31536000";
    }

    # 封面图片处理
    location /static/coverUrl/ {
        alias /usr/share/nginx/html/static/coverUrl/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # 头像处理
    location /static/avatarUrl/ {
        alias /usr/share/nginx/html/static/avatarUrl/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # 反向代理到后端 API
    location /api/ {
        proxy_pass http://backend:8081/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # 错误页面
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
